name: Schema Health Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  schema-health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"

      - name: Run schema health check
        id: check
        run: |
          node scripts/schema-health-check.mjs --json --base-ref origin/${{ github.base_ref }} > report.json 2> summary.txt
          echo "exit_code=0" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Format PR comment
        id: comment
        if: always()
        run: |
          {
            echo 'body<<COMMENT_EOF'

            if [ ! -f report.json ] || [ ! -s report.json ]; then
              echo "## Schema Health Check"
              echo ""
              echo "Failed to generate report. Check workflow logs."
              echo ""
              cat summary.txt 2>/dev/null || true
              echo 'COMMENT_EOF'
            else
              TOTAL=$(jq -r '.summary.total' report.json)
              CONSISTENT=$(jq -r '.summary.fullyConsistent' report.json)
              MISSING_FILE=$(jq -r '.summary.missingSchemaFile' report.json)
              ORPHANS=$(jq -r '.summary.orphanedSchemas' report.json)

              ISSUES=$((MISSING_FILE + ORPHANS))

              if [ "$ISSUES" = "0" ]; then
                echo "## Schema Health Check — All Clear"
                echo ""
                echo "All $TOTAL scopes have consistent local schema files."
              else
                echo "## Schema Health Check — $ISSUES issue(s) found"
                echo ""
                echo "$CONSISTENT/$TOTAL scopes consistent | $MISSING_FILE missing schema files | $ORPHANS orphaned"
                echo ""
                echo "<details>"
                echo "<summary>View issues</summary>"
                echo ""

                if [ "$MISSING_FILE" != "0" ]; then
                  echo "**Missing local schema files:**"
                  echo ""
                  echo "| Scope | Connector | Added in PR? |"
                  echo "|-------|-----------|--------------|"
                  jq -r '.scopes[] | select(.schemaFileExists == false) | "| \(.scope) | \(.connector) | \(if .isNew then "added in this PR" else "" end) |"' report.json
                  echo ""
                fi

                if [ "$ORPHANS" != "0" ]; then
                  echo "**Orphaned schema files** (no connector declares this scope):"
                  echo ""
                  jq -r '.orphanedSchemas[] | "- `schemas/" + . + ".json`"' report.json
                  echo ""
                fi

                echo "</details>"
                echo ""
                echo "> These issues must be resolved before connectors can be considered schema-healthy."
              fi

              echo 'COMMENT_EOF'
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: schema-health-check
          message: ${{ steps.comment.outputs.body }}

      - name: Fail if issues found
        if: steps.check.outcome == 'failure'
        run: |
          cat summary.txt
          exit 1
